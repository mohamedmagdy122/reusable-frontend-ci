name: Reusable Frontend CI

on:
  workflow_call:
    inputs:
      node-version:
        required: true
        type: string
      run-tests:
        required: false
        type: boolean
        default: true
      image-name:
        required: true
        type: string

jobs:

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build -- --configuration production
      - name: Run tests
        if: ${{ inputs.run-tests }}
        run: npm test -- --watchAll=false --passWithNoTests

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Upload Gitleaks report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep.sarif
          if-no-files-found: ignore

  sca-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Retire.js SCA
        run: |
          npm install -g retire
          retire --outputformat json --outputpath retire-report.json || true
        continue-on-error: true
      - name: Upload Retire.js report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: retire-report
          path: retire-report.json
          if-no-files-found: ignore

  dockerfile-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy-config-report.json
        continue-on-error: true
      - name: Upload Trivy config report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-config-report
          path: trivy-config-report.json
          if-no-files-found: ignore

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  image-scan:
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:sha-${{ github.sha }}
          format: json
          output: trivy-image-report.json
        continue-on-error: true
      - name: Upload Trivy image report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: trivy-image-report.json
          if-no-files-found: ignore

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-test, docker-build-push]
    if: github.ref == 'refs/heads/stg' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: mohamedmagdy122/ecommerce-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops
      - name: Update image tag in staging values
        run: |
          cd gitops
          FILE="environments/stg/${{ inputs.image-name }}.yaml"
          sed -i "s/tag: .*/tag: sha-${{ github.sha }}/" $FILE
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add $FILE
          git commit -m "ci: update ${{ inputs.image-name }} staging tag to sha-${{ github.sha }}"
          git push

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-test, docker-build-push]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: mohamedmagdy122/ecommerce-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops
      - name: Update image tag in production values
        run: |
          cd gitops
          FILE="environments/prod/${{ inputs.image-name }}.yaml"
          sed -i "s/tag: .*/tag: sha-${{ github.sha }}/" $FILE
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add $FILE
          git commit -m "ci: update ${{ inputs.image-name }} production tag to sha-${{ github.sha }}"
          git push
